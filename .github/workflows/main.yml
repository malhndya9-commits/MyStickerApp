name: بناء تطبيق Android

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: تثبيت الأدوات
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk apktool apksigner

    - name: بناء التطبيق بـ apktool
      run: |
        apktool b app -o app-debug.apk

    - name: توقيع التطبيق
      run: |
        keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown"
        apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android app-debug.apk

    - name: رفع ملف APK
      uses: actions/upload-artifact@v4
      with:
        name: التطبيق
        path: app-debug.apk
